<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GripAds 소재 자동화</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 13px; }

  .header {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 { font-size: 14px; font-weight: 700; }
  .header .badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 99px; font-size: 11px; }

  .toolbar {
    padding: 10px 16px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #7c3aed; color: white; }
  .btn-secondary { background: #e5e7eb; color: #374151; }
  .btn-success { background: #059669; color: white; }

  #status-bar {
    padding: 6px 16px;
    font-size: 11px;
    color: #6b7280;
    background: #f9fafb;
    border-bottom: 1px solid #e5e7eb;
    min-height: 26px;
  }
  #status-bar.error { color: #dc2626; }
  #status-bar.success { color: #059669; }

  .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 440px; }

  .card {
    background: white;
    border-radius: 10px;
    border: 1.5px solid #e5e7eb;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover { border-color: #7c3aed; box-shadow: 0 2px 8px rgba(124,58,237,0.1); }
  .card.selected { border-color: #7c3aed; background: #faf5ff; }

  .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-title { font-size: 13px; font-weight: 700; color: #111827; }
  .card-time { font-size: 11px; color: #6b7280; }
  .card-seller { font-size: 11px; color: #7c3aed; margin-bottom: 6px; }

  .copy-preview { background: #f9fafb; border-radius: 6px; padding: 8px 10px; margin-top: 8px; }
  .copy-row { display: flex; gap: 6px; margin-bottom: 3px; font-size: 11px; }
  .copy-label { color: #9ca3af; min-width: 36px; }
  .copy-value { color: #374151; flex: 1; }

  .badge-tag {
    display: inline-block;
    background: #fef3c7;
    color: #d97706;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 16px;
    color: #9ca3af;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state p { font-size: 12px; }

  .actions {
    padding: 10px 16px;
    background: white;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>GripAds 소재 자동화</h1>
  <span class="badge" id="count-badge">0건 대기</span>
</div>

<div class="toolbar">
  <button class="btn btn-primary" id="btn-refresh">새로고침</button>
  <button class="btn btn-secondary" id="btn-close">닫기</button>
</div>

<div id="status-bar">백엔드 서버(localhost:3000)에 연결 중...</div>

<div class="list" id="copy-list">
  <div class="empty-state">
    <div class="icon">📋</div>
    <p>새로고침을 눌러 소재 목록을 불러오세요.</p>
  </div>
</div>

<div class="actions">
  <button class="btn btn-success" id="btn-apply" disabled>선택 항목 Figma에 적용 + PNG 저장</button>
</div>

<script>
  const API_BASE = 'http://localhost:3000';
  let copies = [];
  let selectedId = null;
  let pendingBroadcastId = null;

  const statusBar = document.getElementById('status-bar');
  const copyList = document.getElementById('copy-list');
  const btnApply = document.getElementById('btn-apply');
  const countBadge = document.getElementById('count-badge');

  function setStatus(msg, type = '') {
    statusBar.textContent = msg;
    statusBar.className = type;
  }

  async function loadPendingCopies() {
    setStatus('서버에서 소재 목록 불러오는 중...');
    try {
      const res = await fetch(`${API_BASE}/api/pending-copies`);
      if (!res.ok) throw new Error(`서버 응답 오류: ${res.status}`);
      const data = await res.json();
      copies = data.copies || [];
      renderList();
      setStatus(`${copies.length}건의 미처리 소재가 있습니다.`, copies.length > 0 ? 'success' : '');
      countBadge.textContent = `${copies.length}건 대기`;
    } catch (err) {
      setStatus(`연결 실패: ${err.message} — 백엔드 서버(npm start)가 실행 중인지 확인하세요.`, 'error');
    }
  }

  function renderList() {
    if (copies.length === 0) {
      copyList.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>처리할 소재가 없습니다.</p></div>`;
      return;
    }
    copyList.innerHTML = copies.map((c) => `
      <div class="card ${c.broadcastId === selectedId ? 'selected' : ''}" data-id="${c.broadcastId}">
        <div class="card-meta">
          <span class="card-title">${c.broadcastTitle || c.title}${c.badge ? `<span class="badge-tag">${c.badge}</span>` : ''}</span>
          <span class="card-time">${c.scheduledAt ? formatDate(c.scheduledAt) : '시간 미정'}</span>
        </div>
        <div class="card-seller">🏪 ${c.sellerName || ''}</div>
        <div class="copy-preview">
          <div class="copy-row"><span class="copy-label">제목</span><span class="copy-value">${c.title}</span></div>
          <div class="copy-row"><span class="copy-label">문구</span><span class="copy-value">${c.body}</span></div>
          <div class="copy-row"><span class="copy-label">CTA</span><span class="copy-value">${c.cta}</span></div>
        </div>
      </div>
    `).join('');

    copyList.querySelectorAll('.card').forEach((el) => {
      el.addEventListener('click', () => {
        selectedId = el.dataset.id;
        btnApply.disabled = false;
        renderList();
      });
    });
  }

  function formatDate(iso) {
    try {
      const d = new Date(iso);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } catch { return iso; }
  }

  // 적용 버튼: 선택된 소재를 code.js로 전달
  btnApply.addEventListener('click', () => {
    const copy = copies.find((c) => c.broadcastId === selectedId);
    if (!copy) return;
    setStatus(`[${copy.broadcastTitle}] Figma에 적용 중...`);
    btnApply.disabled = true;
    parent.postMessage({ pluginMessage: { type: 'apply-copy', copy } }, '*');
  });

  document.getElementById('btn-refresh').addEventListener('click', loadPendingCopies);
  document.getElementById('btn-close').addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });

  // code.js로부터 메시지 수신
  window.onmessage = async (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      setStatus(msg.message);
    } else if (msg.type === 'fetch-image') {
      // 썸네일 URL을 fetch해 ArrayBuffer로 code.js에 전달
      try {
        const res = await fetch(msg.url);
        const buffer = await res.arrayBuffer();
        parent.postMessage({
          pluginMessage: { type: 'image-data', data: Array.from(new Uint8Array(buffer)), broadcastId: selectedId }
        }, '*');
      } catch (err) {
        setStatus(`썸네일 로드 실패: ${err.message}`, 'error');
      }
    } else if (msg.type === 'export-done') {
      // PNG 데이터를 파일로 다운로드
      const blob = new Blob([new Uint8Array(msg.data)], { type: 'image/png' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = msg.filename;
      a.click();
      URL.revokeObjectURL(url);

      // 백엔드에 완료 처리 요청
      await fetch(`${API_BASE}/api/mark-exported/${msg.broadcastId}`, { method: 'POST' });
      setStatus(`완료! ${msg.filename} 저장됨`, 'success');

      // 목록 갱신
      copies = copies.filter((c) => c.broadcastId !== msg.broadcastId);
      selectedId = null;
      btnApply.disabled = true;
      countBadge.textContent = `${copies.length}건 대기`;
      renderList();
    } else if (msg.type === 'error') {
      setStatus(msg.message, 'error');
      btnApply.disabled = false;
    }
  };

  // 플러그인 열릴 때 자동 로드
  loadPendingCopies();
</script>
</body>
</html>
